global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alert-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: mentor-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - mentor-api:8080
