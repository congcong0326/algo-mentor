services:
  postgres:
    image: postgres:16
    container_name: algo-mentor-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-algo_mentor}
      POSTGRES_USER: ${POSTGRES_USER:-algo_mentor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algo_mentor_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algo_mentor} -d ${POSTGRES_DB:-algo_mentor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mentor-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: algo-mentor-api:local
    container_name: algo-mentor-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-algo_mentor}
      POSTGRES_USER: ${POSTGRES_USER:-algo_mentor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algo_mentor_dev}
      AI_GATEWAY_DEFAULT_PROVIDER: ${AI_GATEWAY_DEFAULT_PROVIDER:-openai}
      AI_GATEWAY_DEFAULT_MODEL: ${AI_GATEWAY_DEFAULT_MODEL:-${OPENAI_MODEL:-gpt-5.2}}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    ports:
      - "${SERVER_PORT:-8080}:8080"
      - "127.0.0.1:5005:5005"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: algo-mentor-prometheus
    profiles:
      - observability
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-alert-rules.yml:/etc/prometheus/prometheus-alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"

  loki:
    image: grafana/loki:3.3.2
    container_name: algo-mentor-loki
    profiles:
      - observability
    command:
      - -config.file=/etc/loki/local-config.yml
    volumes:
      - ./observability/loki.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: algo-mentor-promtail
    profiles:
      - observability
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    container_name: algo-mentor-grafana
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki
volumes:
  postgres-data:
  prometheus-data:
  loki-data:
  grafana-data:
