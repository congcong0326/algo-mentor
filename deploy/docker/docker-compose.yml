services:
  postgres:
    image: postgres:16
    container_name: algo-mentor-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-algo_mentor}
      POSTGRES_USER: ${POSTGRES_USER:-algo_mentor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algo_mentor_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algo_mentor} -d ${POSTGRES_DB:-algo_mentor}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

