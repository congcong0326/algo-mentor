server:
  port: ${API_PORT:${SERVER_PORT:18080}}

spring:
  application:
    name: algo-mentor-api
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    # db/migration 会递归扫描依赖模块下的子目录，新增 V 版本号必须跨模块唯一。
    locations:
      - classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
            user-name-attribute: sub
  session:
    timeout: ${AUTH_SESSION_TIMEOUT:7d}
    jdbc:
      initialize-schema: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}

algo-mentor:
  api:
    sse:
      learning-plan-draft-timeout: ${LEARNING_PLAN_DRAFT_SSE_TIMEOUT:6m}
      practice-message-timeout: ${PRACTICE_MESSAGE_SSE_TIMEOUT:6m}
  auth:
    login-success-url: ${AUTH_LOGIN_SUCCESS_URL:/}
    logout-success-url: ${AUTH_LOGOUT_SUCCESS_URL:/}
    session-timeout: ${AUTH_SESSION_TIMEOUT:7d}
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
    cookie-same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    admin-emails: ${AUTH_ADMIN_EMAILS:}
  agent:
    max-steps: ${AGENT_MAX_STEPS:4}
    tool-choice: ${AGENT_TOOL_CHOICE:auto}
    specific-tool-name: ${AGENT_SPECIFIC_TOOL_NAME:}
    # 阶段一权限 pending request 使用单实例内存实现；多实例部署前需要替换为共享 coordinator。
    tool-permission:
      enabled: ${AGENT_TOOL_PERMISSION_ENABLED:true}
      timeout: ${AGENT_TOOL_PERMISSION_TIMEOUT:60s}
      cleanup-interval: ${AGENT_TOOL_PERMISSION_CLEANUP_INTERVAL:2m}
    compaction:
      inline-max-chars: ${AGENT_TOOL_RESULT_INLINE_MAX_CHARS:12000}
      preview-max-chars: ${AGENT_TOOL_RESULT_PREVIEW_MAX_CHARS:2000}
      range-read-max-chars: ${AGENT_TOOL_RESULT_RANGE_READ_MAX_CHARS:8000}
      blob-enabled: ${AGENT_TOOL_RESULT_BLOB_ENABLED:true}
      tool-results-total-max-chars: ${AGENT_RUN_CONTEXT_TOOL_RESULTS_TOTAL_MAX_CHARS:60000}
      keep-recent-tool-results: ${AGENT_RUN_CONTEXT_KEEP_RECENT_TOOL_RESULTS:3}
      compact-old-tool-results: ${AGENT_RUN_CONTEXT_COMPACT_OLD_TOOL_RESULTS:true}
      input-token-budget: ${AGENT_RUN_CONTEXT_INPUT_TOKEN_BUDGET:120000}
      max-message-groups: ${AGENT_RUN_CONTEXT_MAX_MESSAGE_GROUPS:80}
      snip-keep-head-groups: ${AGENT_RUN_CONTEXT_SNIP_KEEP_HEAD_GROUPS:2}
      snip-keep-tail-groups: ${AGENT_RUN_CONTEXT_SNIP_KEEP_TAIL_GROUPS:24}
      group-aware-snip-enabled: ${AGENT_RUN_CONTEXT_GROUP_AWARE_SNIP_ENABLED:true}
      llm-compact-enabled: ${AGENT_RUN_CONTEXT_LLM_COMPACT_ENABLED:false}
    tools:
      calculator:
        enabled: ${AGENT_CALCULATOR_TOOL_ENABLED:true}
      problem-filters:
        enabled: ${AGENT_PROBLEM_FILTERS_TOOL_ENABLED:true}
      problem-search:
        enabled: ${AGENT_PROBLEM_SEARCH_TOOL_ENABLED:true}
      problem-statement:
        enabled: ${AGENT_PROBLEM_STATEMENT_TOOL_ENABLED:true}
  ai:
    gateway:
      default-provider: ${AI_GATEWAY_DEFAULT_PROVIDER:openai}
      default-model: ${AI_GATEWAY_DEFAULT_MODEL:${OPENAI_MODEL:gpt-5.2}}
    openai:
      enabled: ${OPENAI_ENABLED:false}
      # 测试 key 占位说明：只有已吊销、无计费权限或无外部访问权限的测试 key，泄露后才不会产生实际影响。
      # 真实 OpenAI key 不要写入配置文件，请通过 OPENAI_API_KEY 环境变量注入。
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${OPENAI_MODEL:gpt-5.2}
      timeout: ${OPENAI_TIMEOUT:5m}
      stream-timeout: ${OPENAI_STREAM_TIMEOUT:5m}
      max-retries: ${OPENAI_MAX_RETRIES:2}
